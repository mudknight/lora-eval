name: Build lora-eval

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g., v1.0.0) - optional for builds'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv git zip

      - name: Create virtual environment
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python3 -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          . venv/bin/activate
          pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          . venv/bin/activate
          pip install pyinstaller

      - name: Write version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "${{ github.event.inputs.tag_name }}" > VERSION
          else
            echo "${GITHUB_REF#refs/tags/}" > VERSION
          fi

      - name: Build binary
        run: |
          . venv/bin/activate
          pyinstaller lora-eval.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lora-eval
          path: dist/lora-eval

  release:
    needs: [build]
    runs-on: ubuntu-24.04
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.tag_name != '')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lora-eval
          path: ./artifacts

      - name: Create zip archive
        run: |
          cd artifacts
          zip -r lora-eval.zip lora-eval

      - name: Generate release notes
        id: release_notes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          PREV_TAG=$(git describe --tags --abbrev=0 \
            "${TAG_NAME}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log ${PREV_TAG}..${TAG_NAME} \
              --pretty=format:"* %s (%h)" >> notes.md
          else
            echo "## Initial Release" > notes.md
          fi

          echo "" >> notes.md
          echo "## Downloads" >> notes.md
          echo "" >> notes.md
          echo "* \`lora-eval.zip\` - Ubuntu build" >> notes.md

      - name: Check if pre-release
        id: prerelease
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          if echo "$TAG_NAME" | grep -qE '(alpha|beta|rc|pre)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          body_path: notes.md
          files: |
            ./artifacts/lora-eval.zip
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
